# ROS-Gazebo 브리지 — 로봇 18번 (namespace: robot_18/)
# clock은 bridge_r54.yaml에서 이미 브리지되므로 여기서 제외

- ros_topic_name: "/tf"
  gz_topic_name: "robot_18/tf"
  ros_type_name: "tf2_msgs/msg/TFMessage"
  gz_type_name: "gz.msgs.Pose_V"
  direction: GZ_TO_ROS

- ros_topic_name: "/robot_18/scan"
  gz_topic_name: "robot_18/scan"
  ros_type_name: "sensor_msgs/msg/LaserScan"
  gz_type_name: "gz.msgs.LaserScan"
  direction: GZ_TO_ROS

- ros_topic_name: "/robot_18/cmd_vel"
  gz_topic_name: "robot_18/cmd_vel"
  ros_type_name: "geometry_msgs/msg/Twist"
  gz_type_name: "gz.msgs.Twist"
  direction: ROS_TO_GZ

- ros_topic_name: "/robot_18/odom"
  gz_topic_name: "robot_18/odom"
  ros_type_name: "nav_msgs/msg/Odometry"
  gz_type_name: "gz.msgs.Odometry"
  direction: GZ_TO_ROS

- ros_topic_name: "/robot_18/joint_states"
  gz_topic_name: "robot_18/joint_states"
  ros_type_name: "sensor_msgs/msg/JointState"
  gz_type_name: "gz.msgs.Model"
  direction: GZ_TO_ROS
