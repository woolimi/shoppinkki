# Keepout Filter configuration for BT5 (RETURNING / LOCKED auto-return)
#
# The keepout mask marks zones the robot must avoid when returning to charging.
# Activated via lifecycle_manager_filter STARTUP in bt_returning.py.
# Deactivated (PAUSE) when BT5 completes or fails.
#
# Layer: costmap_filter (nav2_costmap_2d::CostmapFilterInfoServer)
# Mask file: keepout_mask.pgm (generated from shop.pgm — mark product aisles)
#
# Coordinate frame: map
# Resolution must match shop.yaml (0.01 m/px for 1.8x1.4m shop)

costmap_filter_info_server:
  ros__parameters:
    use_sim_time: false
    type: 0  # 0 = KEEPOUT_FILTER
    filter_info_topic: /costmap_filter_info
    mask_topic: /keepout_filter_mask
    base: 0.0
    multiplier: 1.0

keepout_filter_mask_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: "keepout_mask.yaml"
    topic_name: "/keepout_filter_mask"
    frame_id: "map"

# Add keepout filter layer to global costmap when active
# (injected via lifecycle_manager_filter)
global_costmap:
  global_costmap:
    ros__parameters:
      plugins:
        - static_layer
        - obstacle_layer
        - keepout_filter
        - inflation_layer
      keepout_filter:
        plugin: "nav2_costmap_2d::KeepoutFilter"
        enabled: true
        filter_info_topic: "/costmap_filter_info"
