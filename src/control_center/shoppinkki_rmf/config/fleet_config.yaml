# ShopPinkki Open-RMF Fleet 설정
# from_config_files() 호환 포맷 (rmf_fleet_adapter 2.7.2)
#
# 참고:
#   fleet_adapter.py 에서 FleetConfiguration.from_config_files()로 로드
#   nav graph 파일: maps/shop_nav_graph.yaml

rmf_fleet:
  name: "pinky_fleet"

  profile:
    footprint: 0.060     # 로봇 반지름 (m)
    vicinity: 0.200      # 충돌 판정 반경 (m)

  limits:
    linear:  [0.30, 0.50]   # [velocity(m/s), acceleration(m/s²)]
    angular: [1.00, 1.50]   # [velocity(rad/s), acceleration(rad/s²)]

  battery_system:
    voltage:          10.0   # V
    capacity:         10.0   # Ah
    charging_current:  5.0   # A

  mechanical_system:
    mass:                 12.0   # kg
    moment_of_inertia:     0.5   # kg·m²
    friction_coefficient:  0.5

  ambient_system:
    power: 20.0   # W

  tool_system:
    power: 10.0   # W

  recharge_threshold: 0.05
  recharge_soc:       1.0
  account_for_battery_drain: false
  finishing_request: "charge"
  skip_rotation_commands: true

  # 로봇 목록 (charger = initial_waypoint 이름)
  robots:
    pinky_54:
      charger: "P1"
      initial_orientation: 1.5708   # 90° (북쪽)
    pinky_18:
      charger: "P2"
      initial_orientation: 1.5708

# Control Service 연결 (fleet_adapter → control_service REST API)
control_service:
  host: "127.0.0.1"
  http_port: 8081
