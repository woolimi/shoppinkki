# ShopPinkki Open-RMF Fleet 설정
#
# 참고: 이 파일은 fleet_adapter.py에서 로드됩니다.
# traffic_editor로 생성한 nav graph는 maps/shop_nav_graph.yaml 참조.

fleet:
  name: "pinky_fleet"

  # 로봇 목록
  robots:
    - id: "54"
      ip: "192.168.102.54"
      initial_waypoint: "P1"       # 충전소 슬롯 1
      initial_orientation: 1.5708  # 90° (북쪽)

    - id: "18"
      ip: "192.168.102.18"
      initial_waypoint: "P2"       # 충전소 슬롯 2
      initial_orientation: 1.5708

  # 로봇 물리 프로파일 (Pinky Pro 기준)
  profile:
    footprint: 0.060      # 반지름 (m) — Pinky 110mm 폭의 절반
    vicinity: 0.20        # 충돌 판정 반경 (m)

  # 속도/가속도 한계
  limits:
    linear:
      velocity: 0.30      # m/s (config.py LINEAR_X_MAX)
      acceleration: 0.50  # m/s²
    angular:
      velocity: 1.00      # rad/s (config.py ANGULAR_Z_MAX)
      acceleration: 1.50  # rad/s²

  # Nav graph 파일 (maps/ 디렉터리 기준)
  nav_graph: "shop_nav_graph.yaml"

# Control Service 연결 (RMF → control_service REST API)
control_service:
  host: "127.0.0.1"
  http_port: 8081          # REST API 포트

# 로봇 상태 업데이트 주기
update_rate_hz: 2.0
