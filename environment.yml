# 쑈삥끼 macOS / RoboStack 부트스트랩 env
#
# 이 파일은 빈 conda env(+ python + 채널 설정)만 만든다.
# 실제 ROS / Python 패키지 설치는 README "환경 셋업" 절차의 단계별 mamba install
# 명령을 따른다. RoboStack의 ros-jazzy-* 의존성 그래프가 너무 커서 단일 env.yml로
# 한 번에 resolve 시 mamba가 호환 조합을 못 찾는 경우가 잦기 때문.
#
# 사용법:
#   mamba env create -f environment.yml -n jazzy
#   mamba activate jazzy
#   # 이후 README A 트랙의 install 명령들을 순서대로 실행

name: jazzy
channels:
  - robostack-jazzy
  - conda-forge
dependencies:
  - python=3.12
  - pip
  - mamba   # 후속 install을 빠르게
