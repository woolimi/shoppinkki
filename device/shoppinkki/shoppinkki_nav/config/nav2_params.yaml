# Nav2 파라미터 템플릿 (ShopPinkki)
#
# 플레이스홀더:
#   __NS__       → 로봇 namespace (e.g. robot_54)
#   __INIT_X__   → AMCL 초기 pose x
#   __INIT_Y__   → AMCL 초기 pose y
#   __INIT_YAW__ → AMCL 초기 pose yaw
#
# launch 시 resolve_nav2_params() 로 치환 후 사용.

amcl:
  ros__parameters:
    use_sim_time: false
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: "__NS__/base_footprint"
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: "map"
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 100.0
    laser_min_range: -1.0
    laser_model_type: "likelihood_field"
    max_beams: 60
    max_particles: 1000
    min_particles: 200
    odom_frame_id: "__NS__/odom"
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    save_pose_rate: 0.5
    sigma_hit: 0.2
    tf_broadcast: true
    transform_tolerance: 1.0
    update_min_a: 0.1
    update_min_d: 0.15
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05
    scan_topic: /__NS__/scan
    set_initial_pose: true
    initial_pose:
      x: __INIT_X__
      y: __INIT_Y__
      yaw: __INIT_YAW__

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: __NS__/base_link
    odom_topic: /__NS__/odom
    bt_loop_duration: 10
    default_server_timeout: 500
    wait_for_service_timeout: 1000
    action_server_result_timeout: 900.0
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
    error_code_names:
      - compute_path_error_code
      - follow_path_error_code

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0
    costmap_update_timeout: 5.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    use_realtime_priority: false
    enable_stamped_cmd_vel: false
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.05
      # 다중 로봇 + 좁은 통로에서 재계획 여유. 10s는 짧아서 상대 로봇 대기/
      # 벽 옆 미세 이동 시 abort가 자주 난다.
      movement_time_allowance: 20.0
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      # 도달 판정은 pickup zone에서 상품 픽업 가능 거리로 유지.
      xy_goal_tolerance: 0.10
      yaw_goal_tolerance: 0.12
      check_yaw: true
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.12
      max_linear_accel: 0.3
      max_linear_decel: 0.3
      max_angular_vel: 1.5
      lookahead_dist: 0.2
      min_lookahead_dist: 0.1
      max_lookahead_dist: 0.4
      lookahead_time: 1.5
      transform_tolerance: 0.2
      use_velocity_scaled_lookahead_dist: true
      use_collision_detection: false
      use_interpolation: true
      use_rotate_to_heading: true
      rotate_to_heading_min_angle: 0.35
      rotate_to_heading_angular_vel: 1.2
      max_angular_accel: 1.2
      allow_reversing: false
      use_rotate_to_heading_threshold: 0.25
      final_rotation_alpha: 1.0
      allow_final_rotation: true
      use_final_rotation: true
      use_approach_velocity_scaling: true
      approach_velocity_scaling_dist: 0.3
      min_approach_linear_velocity: 0.05
      inflation_cost_scaling_factor: 30.0
      regulated_linear_scaling_min_radius: 0.5
      regulated_linear_scaling_min_speed: 0.05
      use_cost_regulated_linear_velocity_scaling: false
      cost_scaling_dist: 0.6
      cost_scaling_gain: 1.5

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 3.0
      publish_frequency: 1.0
      global_frame: __NS__/odom
      robot_base_frame: __NS__/base_footprint
      rolling_window: true
      width: 1
      height: 1
      resolution: 0.01
      footprint: '[[0.08, 0.055], [0.08, -0.055], [-0.07, -0.055], [-0.07, 0.055]]'
      footprint_padding: 0.0
      plugins: ["voxel_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 30.0
        inflation_radius: 0.10
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan
        scan:
          topic: /__NS__/scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          # 다중 로봇 환경: 상대 로봇이 지나간 자리를 즉시 clear 하기 위해
          # scan에 더 이상 찍히지 않는 mark는 0초 만에 제거한다.
          observation_persistence: 0.0
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      always_send_full_costmap: True

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      footprint_padding: 0.0
      update_frequency: 2.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: __NS__/base_footprint
      footprint: '[[0.08, 0.055], [0.08, -0.055], [-0.07, -0.055], [-0.07, 0.055]]'
      resolution: 0.01
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /__NS__/scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          observation_persistence: 0.0
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
        map_topic: /__NS__/map
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 30.0
        inflation_radius: 0.10
      always_send_full_costmap: True

map_saver:
  ros__parameters:
    use_sim_time: false
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 5.0
    planner_plugins: ["GridBased"]
    costmap_update_timeout: 5.0
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      # pickup_zone 웨이포인트는 벽에서 5~10cm 떨어져 있어 inflation(0.06m)과
      # 겹칠 수 있다. 0.05는 너무 타이트해서 start/goal이 inflated 셀에 있으면
      # plan 생성이 실패한다. 0.2로 완화.
      tolerance: 0.2
      use_astar: true
      allow_unknown: true

smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

behavior_server:
  ros__parameters:
    use_sim_time: false
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    assisted_teleop:
      plugin: "nav2_behaviors::AssistedTeleop"
    local_frame: __NS__/odom
    global_frame: map
    robot_base_frame: __NS__/base_footprint
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 2.0
    min_rotational_vel: 0.5
    rotational_acc_lim: 3.2
    enable_stamped_cmd_vel: false

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    action_server_result_timeout: 900.0
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 15.0
    scale_velocities: True
    feedback: "OPEN_LOOP"
    max_velocity: [0.15, 0.0, 1.5]
    min_velocity: [-0.15, 0.0, -1.5]
    max_accel: [0.5, 0.0, 1.5]
    max_decel: [-0.5, 0.0, -1.5]
    odom_topic: /__NS__/odom
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
    enable_stamped_cmd_vel: false

collision_monitor:
  ros__parameters:
    use_sim_time: false
    base_frame_id: "__NS__/base_footprint"
    odom_frame_id: "__NS__/odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "cmd_vel"
    state_topic: "collision_monitor_state"
    transform_tolerance: 0.2
    source_timeout: 1.0
    base_shift_correction: True
    stop_pub_timeout: 2.0
    polygons: ["PolygonStop", "PolygonSlow"]
    PolygonStop:
      type: "polygon"
      points: "[[0.12, 0.08], [0.12, -0.08], [-0.02, -0.08], [-0.02, 0.08]]"
      action_type: "stop"
      min_points: 3
    PolygonSlow:
      type: "polygon"
      points: "[[0.18, 0.10], [0.18, -0.10], [-0.02, -0.10], [-0.02, 0.10]]"
      action_type: "slowdown"
      max_points: 3
      slowdown_ratio: 0.7
      visualize: False
      polygon_pub_topic: "polygon_slow"
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "/__NS__/scan"
      min_height: 0.05
      max_height: 0.5
      enabled: True
