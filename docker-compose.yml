services:
  mysql:
    image: mysql:8.0
    container_name: shoppinkki_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: shoppinkki
      MYSQL_DATABASE: shoppinkki
      MYSQL_USER: shoppinkki
      MYSQL_PASSWORD: shoppinkki
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./scripts/db/seed_data.sql:/docker-entrypoint-initdb.d/02_seed_data.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ushoppinkki", "-pshoppinkki"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  mysql_data:
