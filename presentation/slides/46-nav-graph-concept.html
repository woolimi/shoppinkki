<section class="flex flex-col">
  <h2 class="text-em-xl font-black mt-0 mb-2 text-center w-full">가이드: <span style="color:#4ADE80">Nav Graph</span>란?</h2>
  <p class="text-em-2xs text-center m-0 mb-6 w-full" style="color:#8BACC8">점(vertex)과 선(lane)으로 표현한 지도</p>

  <div class="flex gap-4 w-11/12 mx-auto flex-1 min-h-0">

    <!-- 왼쪽: 개념 2개 -->
    <div class="flex-[1.1] flex flex-col gap-3">

      <!-- Vertex -->
      <div class="rounded-2xl p-4" style="background:#0A1929;border:1px solid #38BDF8">
        <div class="flex items-center gap-2 mb-2">
          <span class="material-icons-round text-em-sm" style="color:#38BDF8">radio_button_checked</span>
          <p class="text-em-xs font-black m-0" style="color:#38BDF8">Vertex</p>
          <span class="text-em-3xs" style="color:#8BACC8">— 지도 위의 위치</span>
        </div>
        <p class="text-em-3xs m-0" style="color:#8BACC8">
          로봇이 도달 가능한 <strong style="color:#E2E8F0">목적지 단위</strong>. 모든 경로는 vertex에서 시작·종료
        </p>
      </div>

      <!-- Lane -->
      <div class="rounded-2xl p-4" style="background:#0A1929;border:1px solid #A78BFA">
        <div class="flex items-center gap-2 mb-2">
          <span class="material-icons-round text-em-sm" style="color:#A78BFA">timeline</span>
          <p class="text-em-xs font-black m-0" style="color:#A78BFA">Lane</p>
          <span class="text-em-3xs" style="color:#8BACC8">— vertex를 잇는 주행 경로</span>
        </div>
        <p class="text-em-3xs m-0" style="color:#8BACC8">
          단방향 / 양방향 → <strong style="color:#E2E8F0">일방통행</strong> 표현
        </p>
      </div>
    </div>

    <!-- 오른쪽: 다이어그램 -->
    <div class="flex-1 rounded-2xl p-3 flex flex-col items-center justify-center gap-2" style="background:#0A1929;border:1px solid #1E3A5A">
      <p class="text-em-xs font-bold m-0" style="color:#7BA5C8">예시</p>
      <svg viewBox="0 0 320 210" style="max-width:100%;max-height:200px;height:auto">
        <!-- Lanes -->
        <line x1="60" y1="50" x2="260" y2="50" stroke="#A78BFA" stroke-width="3"/>
        <line x1="60" y1="50" x2="60" y2="170" stroke="#A78BFA" stroke-width="3"/>
        <line x1="260" y1="50" x2="260" y2="170" stroke="#A78BFA" stroke-width="3"/>
        <line x1="60" y1="170" x2="260" y2="170" stroke="#A78BFA" stroke-width="3"/>

        <!-- Vertices -->
        <circle cx="60"  cy="50"  r="14" fill="#38BDF8" stroke="#0A1929" stroke-width="3"/>
        <circle cx="260" cy="50"  r="14" fill="#38BDF8" stroke="#0A1929" stroke-width="3"/>
        <circle cx="60"  cy="170" r="14" fill="#38BDF8" stroke="#0A1929" stroke-width="3"/>
        <circle cx="260" cy="170" r="14" fill="#FBBF24" stroke="#0A1929" stroke-width="3"/>

        <!-- Labels -->
        <text x="60"  y="28"  fill="#E2E8F0" font-size="18" text-anchor="middle" font-weight="bold">A</text>
        <text x="260" y="28"  fill="#E2E8F0" font-size="18" text-anchor="middle" font-weight="bold">B</text>
        <text x="60"  y="203" fill="#E2E8F0" font-size="18" text-anchor="middle" font-weight="bold">C</text>
        <text x="260" y="203" fill="#E2E8F0" font-size="18" text-anchor="middle" font-weight="bold">D (charger)</text>

        <!-- Lane label -->
        <text x="160" y="42" fill="#A78BFA" font-size="14" text-anchor="middle" font-style="italic">lane</text>
      </svg>
      <p class="text-em-3xs text-center m-0" style="color:#8BACC8">
        <strong style="color:#4ADE80">Open-RMF</strong>의 Nav Graph 포맷에서 영감 →<br/>자체 구현도 <strong style="color:#E2E8F0">같은 YAML</strong>을 그대로 지원
      </p>
    </div>

  </div>
</section>
