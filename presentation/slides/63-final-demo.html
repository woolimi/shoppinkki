<section class="flex flex-col" id="demo-slide">
  <div class="flex-1 flex flex-col gap-2 w-full">
    <div class="flex-1 flex justify-center items-center">
      <video
        id="final-demo-video"
        src="https://woolimi.cdn.prismic.io/woolimi/aee1FsBOoF08xL-c_final-demo.mp4"
        style="max-height:580px;max-width:100%;display:block;background:transparent"
        autoplay loop muted playsinline
        onloadedmetadata="this.playbackRate=1.0"
        onclick="this.paused ? this.play() : this.pause()">
      </video>
    </div>
    <div data-video-controls="final-demo-video"></div>
  </div>
</section>
